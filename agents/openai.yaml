interface:
  display_name: "Storage Project Investigator"
  short_description: "按 domain-map 系统勘探存储项目"
  default_prompt: "Use $storage-project-investigator to investigate this storage project. Communicate, analyze, and write artifacts in Chinese by default unless the user explicitly requests English. First scan for or create the research artifact workspace. Keep the scope note brief; do not let it delay source analysis. Start from the target project itself: analyze the whole system architecture, component tree, subcomponents, concrete source-code logic, project documents, and cross-component interactions. Summary files are only indexes and verdict tables; create detailed component documents under components/** and entry documents under entries/**. In every detailed document, list concrete files, functions, types, state, queues, config, error paths, and call chains; use short code excerpts or signatures when useful, and add Mermaid diagrams for interactions crossing three or more components. Treat tests, benchmark results, and evidence tables as validation or source locators, never as a substitute for detailed code analysis. After component analysis, use references/domain-map.md as the entry-filling contract. Use assets/examples/3fs-*.md throughout the architecture, component, interaction, entry, and metric passes as examples of the expected deep-dive style. For metrics and universal metrics, write a complete narrative with code logic, worked example, related project documents, external methodology, gaps, and next probes. Use subagents in parallel for independent components or entry groups when available, then integrate the results."
