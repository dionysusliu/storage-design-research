interface:
  display_name: "Storage Project Investigator"
  short_description: "按 domain-map 系统勘探存储项目"
  default_prompt: "Use $storage-project-investigator to investigate this storage project. Communicate, analyze, and write artifacts in Chinese by default unless the user explicitly requests English. First scan for or create the research artifact workspace. Start from the target project itself: analyze the whole system architecture, component tree, subcomponents, detailed source-code logic, project documents, and cross-component interactions. Treat tests, benchmark results, and evidence tables as validation or source locators, never as a substitute for detailed code analysis. After component analysis, use references/domain-map.md as the entry-filling contract. Create one detailed document for every Architecture Checklist, Metrics Checklist, Universal Metric, and Mandatory Artifact item under entries/**/<slug>.md, grounded in the component analysis and supplemented by project-document and external/network context. Use subagents in parallel for independent components or entry groups when available, then integrate the results."
