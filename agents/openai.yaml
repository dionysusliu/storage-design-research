interface:
  display_name: "Storage Project Investigator"
  short_description: "按 domain-map 系统勘探存储项目"
  default_prompt: "Use $storage-project-investigator to investigate this storage project. Communicate, analyze, and write artifacts in Chinese by default unless the user explicitly requests English. First scan for or create the research artifact workspace. Keep the scope note brief; do not let it delay source analysis. Start from the target project itself: analyze the whole system architecture, component tree, subcomponents, concrete source-code logic, project documents, and cross-component interactions. Prefer HTML over Markdown for human-facing artifacts: create detailed component documents under components/**/*.html, entry documents under entries/**/*.html, and an HTML final report. Markdown companions are optional for diff/search only. In every detailed HTML document, list concrete files, functions, types, state, queues, config, error paths, and call chains; combine explanation, short code excerpts, Mermaid or hand-built diagrams, status, risks, and links. Treat tests, benchmark results, and evidence tables as validation or source locators, never as a substitute for detailed code analysis. After component analysis, use references/domain-map.md as the entry-filling contract. Use assets/examples/3fs-*.md throughout the architecture, component, interaction, entry, and metric passes as examples of the expected deep-dive style, and use assets/html/storage-investigation-report-template.html as the starting point for HTML outputs. For metrics and universal metrics, write a complete narrative with code logic, worked example, related project documents, external methodology, gaps, and next probes. Use subagents in parallel for independent components or entry groups when available, then integrate the results."
