interface:
  display_name: "Storage Project Investigator"
  short_description: "按 domain-map 系统勘探存储项目"
  default_prompt: "Use $storage-project-investigator to investigate this storage project. Communicate, analyze, and write artifacts in Chinese by default unless the user explicitly requests English. First scan for or create the research artifact workspace. Keep the scope note brief; do not let it delay source analysis. Create and maintain a mandatory glossary.html before producing HTML deep dives: every abbreviation, storage term, project-specific word/phrase, component, metric, protocol, hardware/kernel term, and domain-map term must have a glossary entry and generated HTML must link terminology to glossary.html#term-*. Start from the target project itself: analyze the whole system architecture, component tree, subcomponents, concrete source-code logic, project documents, and cross-component interactions. Prefer HTML over Markdown for human-facing artifacts: create detailed component documents under components/**/*.html, entry documents under entries/**/*.html, and an HTML final report. Markdown companions are optional for diff/search only. Default to long, detailed artifacts: use assets/html/storage-deep-dive-template.html for component and entry pages, keep full HTML page structure, and do not deliver short card-only pages. The center of every deep dive is component code analysis: entry functions, core types, state ownership, data flow, control/concurrency flow, and cross-component interactions. Use storage-specific lenses only to deepen that code analysis, not as a shallow checklist. For each component, pick the most relevant lenses among supported I/O sizes, hot/cold paths, fast/slow paths, memory data structures, software overhead, threading model, storage stack layers, SPDK/ZNS SSD paths, RDMA/network paths, and distributed consistency/HA; explain how the code is written, why it is designed that way, and what cannot be claimed. Each detailed HTML page should include 8+ substantive sections, 10+ concrete code anchors when available, 3+ code-logic explanations, 2+ short code excerpts or signatures, 1-2 diagrams, tables, worked examples, cannot-claim analysis, gaps, next probes, glossary links, and links back to source locators. Treat tests, benchmark results, and evidence tables as validation or source locators, never as a substitute for detailed code analysis. After component analysis, use references/domain-map.md as the entry-filling contract. Use assets/examples/3fs-*.md throughout the architecture, component, interaction, entry, and metric passes as examples of the expected deep-dive style, use assets/html/storage-glossary-template.html for glossary.html, and use assets/html/storage-investigation-report-template.html as the starting point for the final HTML report. For metrics and universal metrics, write a complete narrative with code logic, worked example, related project documents, external methodology, gaps, and next probes. Use subagents in parallel for independent components or entry groups when available, then integrate the results."
