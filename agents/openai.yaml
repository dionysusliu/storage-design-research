interface:
  display_name: "Storage Project Investigator"
  short_description: "按 domain-map 系统勘探存储项目"
  default_prompt: "Use $storage-project-investigator to investigate this storage project. Communicate, analyze, and write artifacts in Chinese by default unless the user explicitly requests English. First scan for or create the research artifact workspace, then use references/domain-map.md as the investigation contract. Create one detailed entry document for every Architecture Checklist, Metrics Checklist, Universal Metric, and Mandatory Artifact item under entries/**/<slug>.md. Each entry document must include complete code logic, project-document evidence, external/network evaluation, evidence level, cannot-claim boundaries, gaps, and next probes. Use subagents in parallel for independent entry groups when available, then integrate the results."
